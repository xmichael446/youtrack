<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Sora:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Initialize theme before anything else to prevent flickering
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            'sans': ['"Sora"', 'ui-sans-serif', 'system-ui'],
            'mono': ['"DM Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace'],
          },
          colors: {
            brand: {
              primary: '#12C2DC',
              secondary: '#6FD9E8',
              accent: '#0FA9BF',
              dark: '#000000',
            },
            neutral: {
              body: '#2B2B2B',
              bg: '#F6F8FA',
            }
          },
          borderRadius: {
            'xl': '12px',
            '2xl': '16px',
            '3xl': '24px',
            '4xl': '32px',
            '5xl': '40px',
          }
        }
      }
    }
  </script>
  <style>
    /* Prevent transitions on initial load */
    .preload * {
      -webkit-transition: none !important;
      -moz-transition: none !important;
      -ms-transition: none !important;
      -o-transition: none !important;
      transition: none !important;
    }

    body {
      font-family: 'Sora', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overscroll-behavior-y: none; /* App feel: prevent bounce on body */
      -webkit-tap-highlight-color: transparent; /* Remove tap highlight on mobile */
    }

    .font-mono {
      font-family: 'DM Mono', monospace;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    #root {
      height: 100vh;
      height: 100dvh; /* Use dynamic viewport height */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Global transition for theme-affected properties */
    *, ::before, ::after {
      transition-property: background-color, border-color, color, fill, stroke, box-shadow;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 400ms;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(18, 194, 220, 0.25);
      border-radius: 10px;
      transition: background-color 0.3s ease;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: rgba(18, 194, 220, 0.4);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(18, 194, 220, 0.5);
    }

    /* Animation utilities */
    .animate-view-entry {
      animation: view-entry 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes view-entry {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
  <title>YouTrack V2.0</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body class="preload">
  <div id="root"></div>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.body.classList.remove('preload');
      }, 50);
    });
  </script>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
